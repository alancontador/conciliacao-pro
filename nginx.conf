server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html nunca deve ser cacheado — garante que novos deploys sejam carregados imediatamente
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Redireciona todas as rotas para o index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets estáticos com hash no nome (gerado pelo Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
