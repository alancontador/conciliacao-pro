<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative left bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Decorative circles (subtle) -->
  <circle cx="1100" cy="80" r="180" fill="#1e293b" opacity="0.6"/>
  <circle cx="1050" cy="580" r="120" fill="#1e293b" opacity="0.4"/>
  <circle cx="100" cy="550" r="100" fill="#3b82f6" opacity="0.04"/>

  <!-- Icon box -->
  <rect x="536" y="175" width="128" height="128" rx="24" fill="url(#accent)"/>

  <!-- Building icon inside box -->
  <!-- Base building -->
  <rect x="573" y="225" width="54" height="58" rx="3" fill="white" opacity="0.95"/>
  <!-- Roof triangle -->
  <polygon points="564,228 600,200 636,228" fill="white" opacity="0.95"/>
  <!-- Door -->
  <rect x="590" y="252" width="20" height="31" rx="2" fill="#2563eb"/>
  <!-- Windows -->
  <rect x="571" y="232" width="13" height="12" rx="2" fill="#bfdbfe"/>
  <rect x="616" y="232" width="13" height="12" rx="2" fill="#bfdbfe"/>

  <!-- Checkmark overlay (conciliation symbol) -->
  <circle cx="646" cy="183" r="20" fill="#22c55e"/>
  <polyline points="636,183 643,191 656,176" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Main title -->
  <text x="600" y="352" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">ConciliaçãoPRO</text>

  <!-- Subtitle -->
  <text x="600" y="404" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#94a3b8" text-anchor="middle">Sistema de Conciliação Contábil</text>

  <!-- Divider -->
  <rect x="480" y="432" width="240" height="2" rx="1" fill="#3b82f6" opacity="0.5"/>

  <!-- Tagline -->
  <text x="600" y="478" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#64748b" text-anchor="middle">Conciliação inteligente · Balancete · Razão Contábil</text>

  <!-- Bottom strip -->
  <rect x="0" y="580" width="1200" height="50" fill="#0f172a" opacity="0.7"/>
  <circle cx="76" cy="605" r="12" fill="#3b82f6" opacity="0.8"/>
  <text x="100" y="611" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="16" fill="#475569">conciliacaopro.com.br</text>
</svg>
